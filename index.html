<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVOESTUDIO GAMES</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #f1e05a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.8rem; color: white; letter-spacing: 1px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,255,136,0.15);
        }

        .thumb {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border-bottom: 1px solid #30363d;
        }

        .card-info { padding: 15px; text-align: center; }
        .card-info h2 { margin: 0; color: white; font-size: 1.2rem; }
        .tag { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block; }

        .lock-container {
            background: #1c2128;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--primary);
            text-align: center;
            margin: 20px 0;
            width: 100%;
            max-width: 500px;
        }
        input { padding: 12px; border-radius: 5px; border: none; width: 200px; margin-bottom: 15px; text-align: center; outline: none; }
        .btn { padding: 12px 25px; background: var(--primary); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #0d1117; }

        #vip-section { display: none; width: 100%; max-width: 1000px; }
    </style>
</head>
<body>

<header>
    <h1>DAVOESTUDIO GAMES</h1>
    <p>Portal VIP de acceso exclusivo</p>
</header>

<!-- JUEGOS GRATUITOS -->
<h3 style="color: var(--primary)">🔓 JUEGOS GRATUITOS</h3>
<div class="grid">
    <!-- BYPASSCORE -->
    <a href="https://papu128davoo.github.io/BypassCore-10T/" target="_blank" class="card">
        <div class="thumb" style="background: linear-gradient(45deg, #00ff88, #006e3b);">🛡️</div>
        <div class="card-info">
            <span class="tag">GRATIS</span>
            <h2>BYPASSCORE</h2>
        </div>
    </a>

    <!-- MEMORY PLUS -->
    <a href="https://papu128davoo.github.io/MemoryPlus/" target="_blank" class="card">
        <div class="thumb" style="background: linear-gradient(45deg, #5a8eff, #0047ab);">🧩</div>
        <div class="card-info">
            <span class="tag">GRATIS</span>
            <h2>MEMORY PLUS</h2>
        </div>
    </a>
</div>

<hr style="width: 100%; max-width: 1000px; border: 0; border-top: 1px solid #30363d; margin: 40px 0;">

<!-- BLOQUEO VIP -->
<div id="lock-screen" class="lock-container">
    <h2 style="color: white;">🔐 ZONA VIP</h2>
    <p>Introduce el código para desbloquear el catálogo premium.</p>
    <input type="password" id="pass-input" placeholder="Código mensual">
    <br>
    <button class="btn" onclick="checkPass()">ENTRAR AL CATÁLOGO</button>
</div>

<!-- SECCIÓN VIP -->
<div id="vip-section">
    <h3 style="color: var(--accent); text-align: center; margin-bottom: 20px;">👑 CATÁLOGO EXCLUSIVO</h3>
    <div class="grid">
   

        <!-- SURVIVAL DAVO -->
        <a href="https://papu128davoo.github.io/SurvivalDAVO/" target="_blank" class="card">
            <div class="thumb" style="background: #0d6e35;">🌲</div>
            <div class="card-info">
                <span class="tag">PREMIUM</span>
                <h2>SURVIVAL DAVO</h2>
            </div>
        </a>

        <!-- COPIÓN -->
        <a href="https://papu128davoo.github.io/Copion-2E/" target="_blank" class="card">
            <div class="thumb" style="background: #6e6e6e;">✍️</div>
            <div class="card-info">
                <span class="tag">PREMIUM</span>
                <h2>COPIÓN</h2>
            </div>
        </a>

        <!-- SUPER CAR EXTREME -->
        <a href="https://papu128davoo.github.io/SuperCarExtreme/" target="_blank" class="card">
            <div class="thumb" style="background: #ff4444;">🏎️</div>
            <div class="card-info">
                <span class="tag">PREMIUM</span>
                <h2>SUPER CAR EXTREME</h2>
            </div>
        </a>
    </div>
</div>

<script>
    function checkPass() {
        if (document.getElementById('pass-input').value === "pc2024") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('vip-section').style.display = 'block';
        } else {
            alert("Código incorrecto. Habla con David.");
        }
    }
    document.getElementById('pass-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { checkPass(); }
    });
</script>

</body>
</html>
